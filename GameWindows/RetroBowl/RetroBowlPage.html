<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Bowl</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        canvas {
            touch-action: none;
            position: absolute;
            inset: 50% -50% -50% 50%;
            transform: translate(-50%, -50%);
            width: 810px;
            height: 456px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script type="text/javascript" src="https://raw.githubusercontent.com/0Ynx0/0Ynx0.github.io/main/GameScripts/RetroBowl/Main.js"></script>
