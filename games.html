<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
    }

    .container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        border-radius: 20px;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .button {
        display: inline-block;
        padding: 10px 20px;
        margin: 10px;
        border-radius: 20px;
        background-color: #007bff;
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .button:hover {
        background-color: #0056b3;
    }

    .game-image {
        display: block;
        margin: 20px auto;
        max-width: 100%;
        border-radius: 10px;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Games</h1>
    <a class="button" href="#">Back to Games</a>
    <img class="game-image" src="main/GameImages/Retro_Bowl_cover.png" alt="Retro Bowl">
</div>
</body>
</html>
