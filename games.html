<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
    }

    .container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        border-radius: 20px;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .image-button {
        display: inline-block;
        margin: 10px;
        padding: 0;
        border: none;
        border-radius: 10px;
        background: url('path/to/your/image.jpg') no-repeat center center;
        background-size: cover;
        width: 200px; /* Adjust as needed */
        height: 50px; /* Adjust as needed */
        cursor: pointer;
    }

    .image-button:focus {
        outline: none;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Games</h1>
    <button class="image-button" onclick="window.open('https://www.phantomgames.dev/game/retro-bowl/index.html', '_blank')"></button>
</div>
</body>
</html>
